<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BawlOS - Y2K Creative Vault</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 40%, #d4fc79 100%);
            background-attachment: fixed;
            color: #0f172a;
            margin: 0;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .aero-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07), inset 0 1px 0 rgba(255,255,255,0.8);
            border-radius: 20px;
        }

        .aero-btn {
            background: linear-gradient(180deg, #7CE2FE 0%, #32A2F0 100%);
            border: 1px solid #2884C7;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 4px 8px rgba(0,100,200,0.2);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
            border-radius: 9999px;
            transition: all 0.2s;
            font-weight: bold;
            cursor: pointer;
        }
        .aero-btn::after {
            content: ''; position: absolute; top: 0; left: 10%; width: 80%; height: 40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 100%);
            border-radius: 999px; pointer-events: none;
        }
        .aero-btn:hover {
            background: linear-gradient(180deg, #9AEBFF 0%, #4AB4FC 100%);
            transform: translateY(-1px);
        }
        .aero-btn:active {
            transform: translateY(1px);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
        }

        .aero-btn-green {
            background: linear-gradient(180deg, #A8E063 0%, #56AB2F 100%);
            border: 1px solid #458A25;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 4px 8px rgba(34,139,34,0.2);
        }
        .aero-btn-green:hover { background: linear-gradient(180deg, #BFF080 0%, #68C43A 100%); }

        .aero-btn-purple {
            background: linear-gradient(180deg, #c471ed 0%, #8b5cf6 100%);
            border: 1px solid #7c3aed;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 4px 8px rgba(139,92,246,0.2);
        }
        .aero-btn-purple:hover { background: linear-gradient(180deg, #d8b4fe 0%, #a78bfa 100%); }

        .aero-input {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 162, 255, 0.3);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .aero-input:focus {
            background: rgba(255, 255, 255, 0.98);
            border-color: #32A2F0;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05), 0 0 10px rgba(50, 162, 240, 0.4);
        }

        .msn-header {
            background: linear-gradient(180deg, #b9e3fc 0%, #7bc2f3 100%);
            border-bottom: 1px solid #fff;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.9);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #60c5ff; border-radius: 10px; border: 1px solid white; }
        ::-webkit-scrollbar-thumb:hover { background: #009dff; }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .pulse-glow { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorMsg: '' };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, errorMsg: error.message };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen flex items-center justify-center bg-blue-50 p-6">
                            <div className="aero-panel p-8 max-w-xl border-l-8 border-l-red-500 shadow-2xl">
                                <h1 className="text-3xl font-black text-red-600 mb-2">¡Ups! Algo se rompió</h1>
                                <p className="text-blue-900 font-medium mb-4">React encontró un error. Tus datos están a salvo.</p>
                                <div className="bg-red-50 text-red-800 p-4 rounded-xl font-mono text-sm mb-6 overflow-auto">
                                    {this.state.errorMsg}
                                </div>
                                <button onClick={() => window.location.reload()} className="aero-btn aero-btn-green px-8 py-3">
                                    Recargar BawlOS
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const iconPaths = {
            link: "M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71 M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71",
            upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
            trash: "M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",
            zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8z",
            listTodo: "M9 6h11 M9 12h11 M9 18h11 M5 6v.01 M5 12v.01 M5 18v.01",
            terminal: "M4 17l6-6-6-6 M12 19h8",
            settings: "M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
            x: "M18 6L6 18 M6 6l12 12",
            check: "M20 6L9 17l-5-5",
            circle: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z",
            sparkles: "M12 3v3 M12 18v3 M4.5 4.5l2.1 2.1 M17.4 17.4l2.1 2.1 M3 12h3 M18 12h3 M4.5 19.5l2.1-2.1 M17.4 6.6l2.1-2.1 M12 8a4 4 0 1 0 0 8 4 4 0 1 0 0-8z",
            messageCircle: "M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z",
            plus: "M12 5v14 M5 12h14",
            video: "M23 7l-7 5 7 5V7z M14 5H3a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V5z",
            image: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4 M21 15l-5-5L5 21 M21 15l-5-5L5 21 M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z",
            expand: "M15 3h6v6 M9 21H3v-6 M21 3l-7 7 M3 21l7-7",
            orbit: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z M12 6a6 6 0 1 0 0 12 6 6 0 1 0 0-12z M12 2v2 M12 20v2 M22 12h-2 M4 12H2",
            eye: "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
            alert: "M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z M12 9v4 M12 17h.01",
            pen: "M12 19l7-7 3 3-7 7-3-3z M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z M2 2l7.586 7.586"
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            if (name === 'loader') {
                return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83" /></svg>;
            }
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={iconPaths[name] || iconPaths['x']} /></svg>;
        };

        const UfoIcon = ({ className = "", size = 28 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M8 11.5A4 4 0 0 1 16 11.5" />
                <ellipse cx="12" cy="11.5" rx="10" ry="3" />
                <path d="M9 14.5L7 21" />
                <path d="M15 14.5L17 21" />
                <path d="M12 14.5V21" />
            </svg>
        );

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open("BawlOS_Vault", 2);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('items')) db.createObjectStore('items', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('postits')) db.createObjectStore('postits', { keyPath: 'id' });
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        const dbOp = async (storeName, op, data = null) => {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, op === 'readAll' ? 'readonly' : 'readwrite');
                const store = tx.objectStore(storeName);
                let request;
                if (op === 'readAll') request = store.getAll();
                if (op === 'add' || op === 'put') request = store.put(data);
                if (op === 'delete') request = store.delete(data);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        };

        // --- LLAMADA A LA API CON LIMPIEZA DE ERRORES ---
        const callGeminiAPI = async (userApiKey, selectedModel, prompt) => {
            const cleanKey = userApiKey ? userApiKey.trim() : ''; 
            const model = cleanKey ? selectedModel : 'gemini-2.5-flash-preview-09-2025';
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cleanKey}`;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await res.json();
                
                if (data.error) {
                    throw new Error(data.error.message); // Ahora pasa el error real para verlo
                }
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                throw error;
            }
        };

        const CaptureModal = ({ isOpen, onClose, onSave, initialData }) => {
            const [title, setTitle] = useState("");
            const [notes, setNotes] = useState("");
            const [link, setLink] = useState("");
            const [media, setMedia] = useState(null);
            const [mediaType, setMediaType] = useState(""); 
            const [category, setCategory] = useState("Diseño");
            const [aiTool, setAiTool] = useState("");
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (isOpen && initialData) {
                    setTitle(initialData.title || "");
                    setNotes(initialData.description || "");
                    setLink(initialData.link || "");
                    setMedia(initialData.content || null);
                    setMediaType(initialData.type || "");
                    setCategory(initialData.category || "Diseño");
                    setAiTool(initialData.aiTool || "");
                } else if (isOpen && !initialData) {
                    setTitle(""); setNotes(""); setLink(""); setMedia(null); setMediaType("");
                    setCategory("Diseño"); setAiTool("");
                }
            }, [isOpen, initialData]);

            if (!isOpen) return null;

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const isVideo = file.type.startsWith('video/');
                setMediaType(isVideo ? 'video' : 'image');
                const reader = new FileReader();
                reader.onloadend = () => setMedia(reader.result);
                reader.readAsDataURL(file);
            };

            const handleSubmit = () => {
                if (!title && !notes && !media && !link) return;
                const newItem = {
                    id: initialData ? initialData.id : Date.now().toString(),
                    title: title || "Ficha Creativa",
                    content: media, 
                    type: mediaType ? mediaType : (link ? 'link' : 'text'),
                    description: notes,
                    link: link,
                    category: category,
                    aiTool: aiTool,
                    date: initialData ? initialData.date : new Date().toISOString()
                };
                onSave(newItem);
                onClose();
            };

            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-blue-900/50 backdrop-blur-sm px-4">
                    <div className="aero-panel w-full max-w-3xl p-6 bg-white/95 shadow-2xl flex flex-col gap-5 animate-in fade-in zoom-in-95 duration-200">
                        <div className="flex justify-between items-center border-b border-blue-100 pb-3">
                            <h3 className="text-2xl font-extrabold text-blue-900 flex items-center gap-2">
                                <Icon name={initialData ? "pen" : "plus"} className="text-cyan-500" /> {initialData ? "Editar Ficha" : "Nueva Ficha en el Baúl"}
                            </h3>
                            <button onClick={onClose} className="text-blue-400 hover:text-red-500"><Icon name="x" size={24} /></button>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="flex flex-col gap-2 h-full">
                                <label className="text-xs font-bold text-blue-600 uppercase tracking-widest">Media (Hero Image/Video)</label>
                                <div 
                                    className={`flex-1 border-2 border-dashed rounded-xl flex flex-col items-center justify-center p-4 text-center cursor-pointer transition-colors overflow-hidden relative min-h-[250px] ${media ? 'border-transparent bg-black/5' : 'border-blue-300 bg-blue-50/50 hover:bg-blue-100'}`}
                                    onClick={() => !media && fileInputRef.current.click()}
                                >
                                    {media ? (
                                        <>
                                            {mediaType === 'video' ? (
                                                <video src={media} controls className="max-w-full max-h-full rounded-lg shadow-md" />
                                            ) : (
                                                <img src={media} className="w-full h-full object-cover rounded-lg shadow-md" />
                                            )}
                                            <button onClick={(e) => { e.stopPropagation(); setMedia(null); setMediaType(""); }} className="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full shadow-lg hover:bg-red-600"><Icon name="trash" size={16} /></button>
                                        </>
                                    ) : (
                                        <>
                                            <div className="flex gap-2 mb-2 text-cyan-500"><Icon name="image" size={32} /><Icon name="video" size={32} /></div>
                                            <span className="text-blue-800 font-bold text-sm">Clic para subir imagen o video</span>
                                            <span className="text-blue-500 text-xs mt-1">Soporta pantallazos pegados</span>
                                        </>
                                    )}
                                </div>
                                <input type="file" ref={fileInputRef} className="hidden" accept="image/*, video/*" onChange={handleFile} />
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <label className="text-xs font-bold text-blue-600 uppercase tracking-widest">Título de la Idea</label>
                                    <input className="w-full aero-input p-3 mt-1 font-bold text-blue-900" placeholder="Ej: Moodboard Cyberpunk" value={title} onChange={e => setTitle(e.target.value)} />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Etiqueta</label>
                                        <select className="w-full aero-input p-2 mt-1 font-bold text-blue-900 text-sm" value={category} onChange={e => setCategory(e.target.value)}>
                                            <option value="Diseño">Diseño</option>
                                            <option value="Prompt">Prompt</option>
                                            <option value="Ilustración">Ilustración</option>
                                            <option value="Business">Business</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Herramienta IA</label>
                                        <select className="w-full aero-input p-2 mt-1 font-bold text-blue-900 text-sm" value={aiTool} onChange={e => setAiTool(e.target.value)}>
                                            <option value="">Ninguna</option>
                                            <option value="ChatGPT">ChatGPT</option>
                                            <option value="Midjourney">Midjourney</option>
                                            <option value="Gemini">Gemini</option>
                                            <option value="Claude">Claude</option>
                                            <option value="Stable Diffusion">Stable Diffusion</option>
                                            <option value="Runway">Runway</option>
                                            <option value="Leonardo AI">Leonardo AI</option>
                                        </select>
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Link (Opcional)</label>
                                    <div className="flex items-center gap-2 mt-1">
                                        <div className="p-2 bg-blue-50 text-blue-400 rounded-xl"><Icon name="link" size={16} /></div>
                                        <input className="w-full aero-input p-2 text-sm" placeholder="https://..." value={link} onChange={e => setLink(e.target.value)} />
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-blue-600 uppercase tracking-widest">Contexto / Notas</label>
                                    <textarea className="w-full aero-input p-3 mt-1 resize-none h-20 font-medium text-sm text-blue-900" placeholder="Escribe el por qué guardaste esto..." value={notes} onChange={e => setNotes(e.target.value)}></textarea>
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex justify-end mt-2 pt-4 border-t border-blue-100">
                            <button className="aero-btn aero-btn-green px-10 py-3 text-lg" onClick={handleSubmit}>Guardar Ficha</button>
                        </div>
                    </div>
                </div>
            );
        };

        const CardDetailModal = ({ item, onClose, onEdit }) => {
            if (!item) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-blue-900/60 backdrop-blur-md px-4" onClick={onClose}>
                    <div className="aero-panel w-full max-w-4xl max-h-[90vh] overflow-hidden p-0 bg-white/95 shadow-2xl flex flex-col animate-in fade-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                        
                        <div className="relative w-full h-48 sm:h-64 bg-black flex items-center justify-center border-b-4 border-blue-200 shrink-0">
                            {item.type === 'video' ? (
                                <video src={item.content} controls className="w-full h-full object-contain" />
                            ) : (item.type === 'image' || item.content?.startsWith('data:image')) ? (
                                <img src={item.content} className="w-full h-full object-cover" />
                            ) : (
                                <div className="w-full h-full bg-gradient-to-br from-blue-100 to-cyan-200 flex flex-col items-center justify-center">
                                    <Icon name="fileText" size={64} className="text-blue-300 mb-4" />
                                </div>
                            )}
                            <div className="absolute top-4 right-4 flex gap-2">
                                <button onClick={() => { onClose(); onEdit(item); }} className="bg-white/80 text-blue-600 hover:bg-white p-2 rounded-full backdrop-blur-md transition-colors shadow-lg" title="Editar Ficha"><Icon name="pen" size={20} /></button>
                                <button onClick={onClose} className="bg-black/40 text-white hover:bg-red-500 p-2 rounded-full backdrop-blur-md transition-colors shadow-lg" title="Cerrar"><Icon name="x" size={20} /></button>
                            </div>
                        </div>

                        <div className="p-8 flex flex-col gap-6 overflow-y-auto custom-scrollbar flex-1">
                            <div>
                                <h2 className="text-3xl font-extrabold text-blue-900">{item.title || "Sin Título"}</h2>
                                <div className="flex items-center gap-3 mt-2 flex-wrap">
                                    <span className="text-sm text-blue-500 font-medium">{new Date(item.date).toLocaleString()}</span>
                                    <span className="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold border border-blue-200">{item.category || 'Diseño'}</span>
                                    {item.aiTool && <span className="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-xs font-bold border border-purple-200">✨ {item.aiTool}</span>}
                                </div>
                            </div>

                            {item.description && (
                                <div className="bg-blue-50/50 p-6 rounded-2xl border border-blue-100 shadow-inner shrink-0">
                                    <h4 className="text-xs font-bold text-blue-600 uppercase tracking-widest mb-2">Notas y Contexto</h4>
                                    <p className="text-blue-900 font-medium whitespace-pre-wrap leading-relaxed">{item.description}</p>
                                </div>
                            )}

                            {item.link && (
                                <div className="flex items-center gap-3 bg-white border border-blue-200 p-4 rounded-xl shadow-sm hover:shadow-md transition-shadow shrink-0">
                                    <div className="p-2 bg-blue-100 text-blue-500 rounded-lg"><Icon name="link" size={24} /></div>
                                    <div className="flex-1 overflow-hidden">

        const DraggablePostIt = ({ postit, updatePos, deleteNote, updateText }) => {
            const [isDragging, setIsDragging] = useState(false);
            const [pos, setPos] = useState({ x: postit.x, y: postit.y });

            useEffect(() => {
                const onMouseMove = (e) => {
                    if (isDragging) { setPos(prev => ({ x: prev.x + e.movementX, y: prev.y + e.movementY })); }
                };
                const onMouseUp = () => {
                    if (isDragging) { setIsDragging(false); updatePos(postit.id, pos.x, pos.y); }
                };
                if (isDragging) {
                    window.addEventListener('mousemove', onMouseMove);
                    window.addEventListener('mouseup', onMouseUp);
                }
                return () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
            }, [isDragging, pos, postit.id, updatePos]);

            return (
                <div style={{ left: pos.x, top: pos.y }} className="absolute w-48 bg-gradient-to-br from-[#fef08a] to-[#fde047] border border-[#facc15] shadow-xl rounded-xl p-1 z-10 hover:z-20">

                            </button>
                        </div>
                        <span className="text-xs text-blue-600 font-bold bg-white/50 px-3 py-1.5 rounded-full border border-blue-200 shadow-sm flex items-center gap-2">
                            <Icon name="plus" size={14}/> Clic en Canvas para Nota
                        </span>
                    </div>

                    {feedback && (
                        <div className="aero-panel bg-white/95 p-5 font-medium flex items-start gap-4 text-blue-900 border-l-4 border-l-blue-500 shadow-lg relative">
                            <button onClick={()=>setFeedback("")} className="absolute top-2 right-2 text-blue-300 hover:text-red-500"><Icon name="x" size={16}/></button>
                            <div className="bg-blue-100 p-2 rounded-full shrink-0"><Icon name="sparkles" className="text-blue-600" /></div>
                            <div className="text-sm"><span className="text-blue-500 font-black uppercase tracking-widest text-xs block mb-2">Feedback: {experto}</span> 
                            <p className="whitespace-pre-wrap">{feedback.replace(/[\*#]/g, '')}</p></div>
                        </div>
                    )}

                    <div 
                        ref={canvaRef} onClick={handleCanvasClick}
                        className="flex-1 aero-panel bg-white/40 overflow-hidden relative flex items-center justify-center shadow-inner cursor-crosshair border-4 border-white/50"
                    >
                        {image ? (
                            <img src={image} className="max-w-full max-h-full object-contain pointer-events-none rounded-xl shadow-md" />
                        ) : (
                            <div className="text-blue-400 font-bold text-xl p-8 text-center border-2 border-dashed border-blue-300 rounded-3xl pointer-events-none">
                                MESA CRÍTICA<br/><span className="text-sm font-medium">Sube una imagen y haz clic para pegar notas</span>
                            </div>
                        )}
                        
                        {postits.map(p => (
                            <DraggablePostIt key={p.id} postit={p} updatePos={updatePostitPos} deleteNote={deletePostit} updateText={updatePostitText} />
                        ))}
                    </div>
                </div>
            );
        };

        const SparkAgent = ({ isOpen, onClose, items, apiKey, geminiModel }) => {
            const [query, setQuery] = useState("");
            const [messages, setMessages] = useState([]);
            const [isThinking, setIsThinking] = useState(false);
            const chatRef = useRef(null);

            useEffect(() => {
                if(chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [messages]);

            const handleSend = async (e) => {
                e.preventDefault();
                if(!query.trim()) return;
                
                const newMessages = [...messages, { text: query, sender: 'user' }];
                setMessages(newMessages);
                setQuery("");
                setIsThinking(true);

                try {
                    const ctx = items.map(i => `[${i.title}: ${i.description || 'sin desc'}]`).join(" | ");
                    const prompt = `Eres Spark, un coach creativo para alguien con TDAH. Eres motivador, directo y usas emojis. 
CONTEXTO DEL USUARIO (Sus ideas guardadas): ${ctx}.
MENSAJE DEL USUARIO: ${query}`;
                    
                    const res = await callGeminiAPI(apiKey, geminiModel, prompt);
                    setMessages(prev => [...prev, { text: res, sender: 'spark' }]);
                } catch(err) {
                    setMessages(prev => [...prev, { text: `⚠️ Error de conexión:\n${err.message}`, sender: 'spark' }]);
                } finally {
                    setIsThinking(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed bottom-24 right-6 w-80 h-[500px] aero-panel bg-white/95 shadow-2xl flex flex-col z-50 overflow-hidden animate-in slide-in-from-bottom-4 duration-300 border border-white">
                    <div className="msn-header p-3 flex justify-between items-center text-white cursor-default shadow-md">
                        <div className="flex items-center gap-2">
                            <div className="bg-white/20 p-1.5 rounded-lg border border-white/50"><Icon name="zap" size={18} className="text-white drop-shadow-md" /></div>
                            <div>
                                <h3 className="font-bold text-sm leading-tight text-blue-900 drop-shadow-sm">Spark AI</h3>
                                <p className="text-[10px] text-blue-700 font-bold">Coach Creativo</p>
                            </div>
                        </div>
                        <button onClick={onClose} className="hover:bg-white/30 p-1.5 rounded-lg transition-colors text-blue-900"><Icon name="x" size={16} /></button>
                    </div>

                    <div ref={chatRef} className="flex-1 p-4 overflow-y-auto flex flex-col gap-4 custom-scrollbar bg-blue-50/50">
                        <div className="text-center mb-2 mt-2">
                            <div className="bg-white p-3 rounded-full inline-block border border-blue-100 shadow-sm mb-2"><Icon name="sparkles" size={24} className="text-cyan-500" /></div>
                            <p className="text-xs text-blue-500 font-bold">Spark conectado. Pide ayuda o consejo sobre tu baúl.</p>
                        </div>
                        
                        {messages.map((msg, i) => (
                            <div key={i} className={`flex flex-col ${msg.sender === 'user' ? 'items-end' : 'items-start'}`}>
                                <span className="text-[9px] text-blue-400 mb-0.5 px-1 font-extrabold tracking-wider">{msg.sender === 'user' ? 'TÚ' : 'SPARK'}</span>
                                <div className={`p-3 rounded-2xl text-sm max-w-[85%] shadow-sm font-medium leading-relaxed ${msg.sender === 'user' ? 'bg-gradient-to-br from-blue-400 to-cyan-400 text-white rounded-tr-sm border border-blue-300' : 'bg-white text-blue-900 border border-blue-100 rounded-tl-sm whitespace-pre-wrap'}`}>
                                    {msg.text.replace(/[\*#]/g, '')}
                                </div>
                            </div>
                        ))}
                        {isThinking && (
                            <div className="text-xs text-blue-500 flex items-center gap-2 bg-white p-2.5 rounded-2xl w-fit border border-blue-100 shadow-sm font-bold"><Icon name="loader" size={14} className="text-cyan-500" /> Procesando...</div>
                        )}
                    </div>

                    <form onSubmit={handleSend} className="p-3 bg-white border-t border-blue-100 flex gap-2">
                        <input 
                            type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="Habla con Spark..."
                            className="flex-1 bg-blue-50/50 border border-blue-200 rounded-xl px-4 py-2 text-sm text-blue-900 font-medium focus:outline-none focus:border-cyan-400 focus:bg-white transition-colors shadow-inner"
                        />
                        <button type="submit" disabled={isThinking} className="bg-gradient-to-b from-cyan-400 to-blue-500 text-white w-10 h-10 flex items-center justify-center rounded-xl hover:brightness-110 disabled:opacity-50 transition-all shadow-md active:scale-95 border border-blue-300">
                            <Icon name="sparkles" size={18} />
                        </button>
                    </form>
                </div>
            );
        };

        const SettingsModal = ({ onClose, apiKey, setApiKey, geminiModel, setGeminiModel, handleSaveApiKey }) => {
            const [availableModels, setAvailableModels] = useState([]);
            const [isLoadingModels, setIsLoadingModels] = useState(false);

            useEffect(() => {
                const fetchModels = async () => {
                    const cleanKey = apiKey.trim();
                    if (!cleanKey) return;
                    
                    setIsLoadingModels(true);
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${cleanKey}`);
                        const data = await res.json();
                        if (data.models) {
                            // Extrae solo los modelos de gemini que podemos usar
                            const models = data.models
                                .map(m => m.name.replace('models/', ''))
                                .filter(name => name.includes("gemini"));
                            
                            setAvailableModels(models);

                            // Si el modelo actual no está en la lista de los permitidos, cámbialo al primero válido
                            if (models.length > 0 && !models.includes(geminiModel)) {
                                const newDefault = models.find(m => m.includes('1.5-flash')) || models[0];
                                setGeminiModel(newDefault);
                            }
                        }
                    } catch (e) {
                        console.error("No se pudieron cargar los modelos dinámicos.");
                    } finally {
                        setIsLoadingModels(false);
                    }
                };

                fetchModels();
            }, [apiKey]); // Se ejecuta cada vez que pegas una llave nueva

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-blue-900/40 backdrop-blur-md px-4">
                    <div className="aero-panel w-full max-w-sm p-8 bg-white/95 shadow-2xl flex flex-col gap-4 animate-in zoom-in-95">
                        <h2 className="text-2xl font-black text-blue-900 flex items-center gap-2"><Icon name="settings" className="text-cyan-500"/> Ajustes</h2>
                        <div>
                            <label className="text-xs font-bold text-blue-600 uppercase tracking-widest block mb-2">Google Gemini API Key</label>
                            <input 
                                type="password" 
                                value={apiKey} 
                                onChange={e => setApiKey(e.target.value)} 
                                placeholder="Pega tu clave AIzaSy..." 
                                className="w-full aero-input p-3 font-mono text-sm" 
                            />
                            
                            <label className="text-xs font-bold text-blue-600 uppercase tracking-widest block mb-2 mt-4">
                                Modelo Habilitado por Google {isLoadingModels && <Icon name="loader" size={12} className="inline ml-1 text-cyan-500" />}
                            </label>
                            
                            <select 
                                value={geminiModel} 
                                onChange={e => setGeminiModel(e.target.value)} 
                                className="w-full aero-input p-3 font-bold text-sm text-blue-900 cursor-pointer"
                                disabled={isLoadingModels}
                            >
                                {availableModels.length > 0 ? (
                                    availableModels.map(m => <option key={m} value={m}>{m}</option>)
                                ) : (
                                    <option value={geminiModel}>{apiKey.trim() ? "Cargando tus modelos..." : "Modelo Interno (Solo pruebas)"}</option>
                                )}
                            </select>
                            
                            <p className="text-[10px] text-blue-500 font-bold mt-4 leading-relaxed bg-blue-50 p-3 rounded-xl border border-blue-100">
                                ¡Se acabó adivinar! Pega tu llave y el sistema extraerá automáticamente <b>los modelos exactos que tu cuenta tiene permitidos usar.</b>
                            </p>
                        </div>
                        <div className="flex gap-3 mt-4">
                            <button onClick={onClose} className="flex-1 aero-btn bg-gray-200 text-blue-900 py-3 shadow-none border-gray-300">Cancelar</button>
                            <button onClick={handleSaveApiKey} className="flex-1 aero-btn aero-btn-green py-3">Guardar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [items, setItems] = useState([]);
            const [dbReady, setDbReady] = useState(false);
            const [isSparkOpen, setIsSparkOpen] = useState(false);
            const [isCardModalOpen, setIsCardModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('bawl_gemini_key') || '');
            const [geminiModel, setGeminiModel] = useState(() => localStorage.getItem('bawl_gemini_model') || 'gemini-1.5-flash');

            useEffect(() => {
                dbOp('items', 'readAll').then(data => {
                    setItems(data.sort((a,b) => new Date(b.date) - new Date(a.date)));
                    setDbReady(true);
                }).catch(console.error);
            }, []);

            const handleSaveApiKey = () => {
                localStorage.setItem('bawl_gemini_key', apiKey.trim());
                localStorage.setItem('bawl_gemini_model', geminiModel);
                setIsSettingsOpen(false);
            };

            if (!dbReady) return (
                <div className="min-h-screen flex items-center justify-center bg-blue-50 flex-col gap-4">
                    <div className="w-16 h-16 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
                    <div className="font-extrabold text-xl text-blue-700 animate-pulse tracking-widest">CARGANDO BAWLOS...</div>
                </div>
            );

            const tabs = [
                { id: 'dashboard', label: 'El Baúl', icon: 'upload' },
                { id: 'taller', label: 'Fusión', icon: 'zap' },
                { id: 'multiverso', label: 'Multiverso', icon: 'orbit' },
                { id: 'workflow', label: 'Workflow', icon: 'listTodo' },
                { id: 'canva', label: 'Mesa Crítica', icon: 'terminal' },
            ];

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col relative">
                    
                    <header className="aero-panel mb-8 p-4 md:p-5 flex flex-col md:flex-row justify-between items-center gap-6 sticky top-4 z-40 bg-white/70">
                        <div className="flex items-center gap-4 cursor-pointer hover:scale-105 transition-transform" onClick={()=>setActiveTab('dashboard')}>
                            <div className="relative">
                                <div className="w-14 h-14 bg-gradient-to-br from-white to-blue-100 rounded-2xl border-2 border-white shadow-md flex items-center justify-center text-blue-600 transition-transform duration-300">
                                    <UfoIcon size={32} />
                                </div>
                                <div className="absolute -bottom-1 -right-1 w-4 h-4 bg-[#56AB2F] rounded-full border-2 border-white shadow-sm" title="Online"></div>
                            </div>
                            <div className="flex flex-col leading-tight">
                                <h1 className="font-black text-3xl text-blue-900 tracking-tight drop-shadow-sm">BawlOS</h1>
                            </div>
                        </div>
                        
                        <nav className="flex gap-2 overflow-x-auto w-full md:w-auto bg-white/50 p-1.5 rounded-full border border-white shadow-inner custom-scrollbar">
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-2.5 rounded-full text-sm font-bold flex items-center gap-2 transition-all shrink-0 ${activeTab === tab.id ? 'bg-white text-blue-900 shadow-sm border border-blue-100' : 'text-blue-700 hover:bg-white/60 hover:text-blue-900'}`}>
                                    <Icon name={tab.icon} size={16} className="hidden sm:block text-cyan-500" /> {tab.label}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="flex items-center gap-3">
                            <button onClick={() => setIsSettingsOpen(true)} className="p-3 bg-white/50 hover:bg-white border border-white rounded-full text-blue-600 transition-all shadow-sm hover:rotate-90"><Icon name="settings" size={20}/></button>
                            <button onClick={() => { setEditingItem(null); setIsCardModalOpen(true); }} className="aero-btn aero-btn-green px-6 py-2.5 flex items-center gap-2 shadow-md">
                                <Icon name="plus" size={18} /> <span className="hidden sm:inline">Nueva Idea</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 w-full max-w-7xl mx-auto z-10 relative">
                        {activeTab === 'dashboard' && <Dashboard items={items} setItems={setItems} onEditItem={(item) => { setEditingItem(item); setIsCardModalOpen(true); }} />}
                        {activeTab === 'taller' && <TallerMutacion items={items} apiKey={apiKey} geminiModel={geminiModel} />}
                        {activeTab === 'multiverso' && <Multiverso items={items} apiKey={apiKey} geminiModel={geminiModel} />}
                        {activeTab === 'workflow' && <Workflow items={items} apiKey={apiKey} geminiModel={geminiModel} />}
                        {activeTab === 'canva' && <Canva apiKey={apiKey} geminiModel={geminiModel} />}
                    </main>

                    {isSettingsOpen && (
                        <SettingsModal 
                            onClose={() => setIsSettingsOpen(false)} 
                            apiKey={apiKey} 
                            setApiKey={setApiKey} 
                            geminiModel={geminiModel} 
                            setGeminiModel={setGeminiModel} 
                            handleSaveApiKey={handleSaveApiKey} 
                        />
                    )}

                    <SparkAgent isOpen={isSparkOpen} onClose={() => setIsSparkOpen(false)} items={items} apiKey={apiKey} geminiModel={geminiModel} />
                    
                    <button 
                        onClick={() => setIsSparkOpen(!isSparkOpen)} 
                        className={`fixed bottom-6 right-6 w-16 h-16 aero-btn rounded-full flex items-center justify-center shadow-2xl z-40 transition-transform duration-300 border-2 border-white ${isSparkOpen ? 'scale-0' : 'scale-100 hover:scale-110 pulse-glow'}`}
                        title="Hablar con Spark"
                    >
                        <Icon name="zap" size={28} className="text-white drop-shadow-md" />
                        <div className="absolute top-1 right-1 w-3.5 h-3.5 bg-[#56AB2F] rounded-full border-2 border-white shadow-sm"></div>
                    </button>

                    <CaptureModal 
                        isOpen={isCardModalOpen} onClose={() => { setIsCardModalOpen(false); setEditingItem(null); }} 
                        initialData={editingItem}
                        onSave={async (newItem) => { 
                            await dbOp('items', 'put', newItem); 
                            setItems(prev => {
                                const index = prev.findIndex(i => i.id === newItem.id);
                                if (index !== -1) {
                                    const newItems = [...prev];
                                    newItems[index] = newItem;
                                    return newItems;
                                }
                                return [newItem, ...prev];
                            }); 
                        }} 
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
